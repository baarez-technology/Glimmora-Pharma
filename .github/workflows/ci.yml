name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  check:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Postgres CI deferred to the Phase-4 Postgres migration (schema is sqlite
    # until then). CI runs against a throwaway SQLite file matching dev.
    env:
      DATABASE_URL: "file:./prisma/ci.db"
      NEXTAUTH_SECRET: "ci-only-secret-32-bytes-long-aaaaaa"
      NEXTAUTH_URL: "http://localhost:3000"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations to a fresh SQLite DB
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  smoke:
    name: Playwright smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: check

    # Postgres CI deferred to the Phase-4 Postgres migration (schema is sqlite
    # until then). CI runs against a throwaway SQLite file matching dev.
    env:
      DATABASE_URL: "file:./prisma/ci.db"
      NEXTAUTH_SECRET: "ci-only-secret-32-bytes-long-aaaaaa"
      NEXTAUTH_URL: "http://localhost:3000"
      CI: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations + seed test DB
        run: |
          npx prisma migrate deploy
          npm run db:seed

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npm run test:smoke

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
